<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Layout</title>

<style>
    html, body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* HEADER – Purple strip bar */
    header {
        background-color: rgb(131, 88, 230);
        padding: 20px;
        color: white;
    }

    header h1 {
        margin: 0;
        text-align: left;
    }

    /* LAYOUT CONTAINER */
    #container {
        display: flex;
        height: calc(100% - 120px); /* subtract header + footer height */
    }

    /* NAV – Brown sidebar */
    nav {
        background-color: #8b5a2b; /* brown */
        width: 250px;
        padding: 20px;
        color: white;
    }

    /* MAIN – Light green content area */
    main {
        flex: 1;
        background-color: #90ee90; /* LIGHT GREEN */
        padding: 40px;
        color: black;
    }

    /* FOOTER – Purple strip bar */
    footer {
        background-color: rgb(131, 88, 230);
        padding: 20px;
        color: white;
        text-align: left;
        font-weight: bold;
    }
</style>

</head>

<body>

<header>
    <h1>header: Page Banner Here</h1>
</header>

<div id="container">

    <nav>
        <h2>nav: Website navigation in here - links to other pages in the site.</h2>
    </nav>

    <main>
        <h2>main: Each page unique content in here</h2>
    </main>

</div>

<footer>
    footer: copyright, terms of use, policies are often in the footer
</footer>

</body>
</html>
